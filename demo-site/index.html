<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Project Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <p class="eyebrow">Safe local-only demo</p>
      <h1>Local Project Dashboard</h1>
      <p class="intro">
        Explore sample projects, filter them locally, and inspect details without leaving
        this machine.
      </p>
    </header>

    <section class="control-panel" aria-label="Project filters">
      <div class="control-field">
        <label for="searchInput">Search projects</label>
        <input
          id="searchInput"
          data-testid="searchInput"
          type="search"
          placeholder="Search by name, tag, or summary">
      </div>

      <div class="control-field">
        <label for="tagFilter">Filter by tag</label>
        <select id="tagFilter" data-testid="tagFilter">
          <option value="">All tags</option>
        </select>
      </div>

      <div class="control-field">
        <label for="sortSelect">Sort projects</label>
        <select id="sortSelect" data-testid="sortSelect">
          <option value="updated-desc">Most recently updated</option>
          <option value="name-asc">Name</option>
          <option value="status-asc">Status</option>
          <option value="difficulty-asc">Difficulty</option>
        </select>
      </div>
    </section>

    <p id="statusLabel" data-testid="statusLabel" class="status-label" aria-live="polite"></p>

    <section class="dashboard-grid">
      <section class="project-column" aria-labelledby="projectListHeading">
        <div class="section-heading">
          <h2 id="projectListHeading">Projects</h2>
          <p>Choose a project to view its details.</p>
        </div>
        <div id="projectList" data-testid="projectList" class="project-list"></div>
      </section>

      <aside class="details-column" aria-labelledby="detailsHeading">
        <div id="detailsPanel" data-testid="detailsPanel" class="details-panel">
          <h2 id="detailsHeading">Project details</h2>
          <p>Select a project to populate this panel.</p>
        </div>
      </aside>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
